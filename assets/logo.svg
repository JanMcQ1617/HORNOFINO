<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Hornofino emblem">
  <!-- Greek amphora / column emblem inside a meander frame -->
  <rect x="2" y="2" width="60" height="60" rx="4" stroke="currentColor" stroke-width="2"/>
  <!-- meander corners -->
  <path d="M8 8h10v3h-7v7H8z M56 8H46v3h7v7h3z M8 56h10v-3h-7v-7H8z M56 56H46v-3h7v-7h3z"
        fill="currentColor"/>
  <!-- amphora -->
  <path d="M32 16c4 0 6 2 6 5 0 2-1 3-2 4 3 2 5 6 5 11 0 7-4 11-9 11s-9-4-9-11c0-5 2-9 5-11-1-1-2-2-2-4 0-3 2-5 6-5z"
        stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M26 21c-3 0-5 2-5 4M38 21c3 0 5 2 5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="52" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</svg>
